name: Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # External pull requests from forks have no access to secrets, so they run a
  # secret-free, static-only pipeline. This job runs *only* in that context.
  static:
    name: Static Checks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Select Node Version
        uses: svierk/get-node-version@main
      - name: Install Dependencies
        run: npm install --ignore-scripts
      - name: Check Component READMEs
        run: npm run lint:readme
      - name: Code Review
        uses: svierk/sfdx-code-review@main
        with:
          code-analyzer: 'false'
          prettier: 'true'
          eslint: 'true'
          prettier-command: npm run prettier:verify
          eslint-command: npm run lint
      - name: Run Tests
        uses: svierk/sfdx-run-tests@main
        with:
          apex: false
          lwc: true
          flow: false

  # Pushes, manual runs and internal pull requests (including Dependabot) have
  # access to secrets and run the full validation. This job runs in every
  # context except pull requests from forks.
  validation:
    name: Org Validation
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
      - name: Select Node Version
        uses: svierk/get-node-version@main
      - name: Install Dependencies
        run: npm install --ignore-scripts
      - name: Check Component READMEs
        run: npm run lint:readme
      - name: Code Review
        uses: svierk/sfdx-code-review@main
        with:
          code-analyzer: 'false'
          prettier: 'true'
          eslint: 'true'
          prettier-command: npm run prettier:verify
          eslint-command: npm run lint:sonar
      - name: Install SF CLI
        uses: svierk/sfdx-cli-setup@main
      - name: Salesforce Org Login
        uses: svierk/sfdx-login@main
        with:
          client-id: ${{ secrets.SFDX_CONSUMER_KEY }}
          jwt-secret-key: ${{ secrets.SFDX_JWT_SECRET_KEY }}
          username: ${{ vars.SFDX_USERNAME }}
      - name: Deploy Metadata
        uses: svierk/sfdx-deploy@main
      - name: Run Tests
        uses: svierk/sfdx-run-tests@main
        with:
          apex: true
          lwc: true
          flow: false # enable once Flow tests exist in the project
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Codecov Coverage Upload
        uses: codecov/codecov-action@main
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
