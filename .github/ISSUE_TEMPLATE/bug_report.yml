name: 🐞 Bug report
description: Report a problem with an existing component or the tooling.
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report! Please fill out the sections below so we can reproduce and fix the issue.
  - type: input
    id: component
    attributes:
      label: Affected component
      description: Which component (or part of the tooling) is affected?
      placeholder: e.g. Custom Datatable
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Add component to '...'
        2. Set attribute '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where does this happen?
      placeholder: |
        - Org type: Developer Edition / Scratch / Sandbox / Production
        - Browser: Chrome 125
        - API version: 61.0
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am using the latest state of the `main` branch.
          required: false
