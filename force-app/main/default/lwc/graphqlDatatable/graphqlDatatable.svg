<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#FFFFFF" />
  <!-- Table outline -->
  <rect x="12" y="18" width="76" height="64" fill="none" stroke="#0D1B3E" stroke-width="5" />
  <!-- Blue header -->
  <rect x="12" y="18" width="76" height="15" fill="#00A1E0" />
  <!-- Row dividers -->
  <line x1="12" y1="49" x2="88" y2="49" stroke="#0D1B3E" stroke-width="4" />
  <line x1="12" y1="65" x2="88" y2="65" stroke="#0D1B3E" stroke-width="4" />
  <!-- Column divider -->
  <line x1="48" y1="33" x2="48" y2="82" stroke="#0D1B3E" stroke-width="4" />
  <!-- GraphQL badge: 3 connected nodes -->
  <circle cx="78" cy="76" r="16" fill="#00A1E0" stroke="#FFFFFF" stroke-width="3" />
  <g stroke="#FFFFFF" stroke-width="2.2">
    <line x1="78" y1="68" x2="71" y2="84" />
    <line x1="78" y1="68" x2="85" y2="84" />
    <line x1="71" y1="84" x2="85" y2="84" />
  </g>
  <g fill="#FFFFFF">
    <circle cx="78" cy="68" r="3" />
    <circle cx="71" cy="84" r="3" />
    <circle cx="85" cy="84" r="3" />
  </g>
</svg>
