<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#FFFFFF" />
  <!-- Select field -->
  <rect x="14" y="18" width="72" height="20" rx="3" fill="none" stroke="#0D1B3E" stroke-width="5" />
  <polyline
    points="68,27 74,33 80,27"
    fill="none"
    stroke="#00A1E0"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Dropdown panel -->
  <rect x="14" y="46" width="72" height="38" rx="3" fill="none" stroke="#0D1B3E" stroke-width="5" />
  <!-- Option 1 (checked) -->
  <rect x="22" y="53" width="12" height="12" rx="2" fill="#00A1E0" />
  <polyline
    points="24.5,59 27.5,62 32,55.5"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <line x1="40" y1="59" x2="78" y2="59" stroke="#0D1B3E" stroke-width="4" stroke-linecap="round" />
  <!-- Option 2 (checked) -->
  <rect x="22" y="69" width="12" height="12" rx="2" fill="#00A1E0" />
  <polyline
    points="24.5,75 27.5,78 32,71.5"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <line x1="40" y1="75" x2="70" y2="75" stroke="#0D1B3E" stroke-width="4" stroke-linecap="round" />
</svg>
