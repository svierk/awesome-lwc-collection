<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#FFFFFF" />
  <!-- Writing pad -->
  <rect x="6" y="14" width="46" height="68" rx="4" fill="none" stroke="#0D1B3E" stroke-width="5" />
  <!-- Signature wave -->
  <path d="M14,50 C22,38 32,62 40,50 C46,40 50,52 48,44" fill="none" stroke="#00A1E0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Baseline -->
  <line x1="14" y1="64" x2="48" y2="64" stroke="#0D1B3E" stroke-width="3" stroke-linecap="round" opacity="0.35" />
  <!-- Large diagonal pen body -->
  <polygon points="74,17 90,23 73,73 57,67" fill="#0D1B3E" />
  <!-- Pen cap (top accent) -->
  <polygon points="74,17 77,9 93,15 90,23" fill="#00A1E0" />
  <!-- Pen nib (bottom accent) -->
  <polygon points="57,67 73,73 58,92" fill="#00A1E0" />
</svg>
